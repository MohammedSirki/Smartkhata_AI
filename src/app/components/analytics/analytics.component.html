<section #section class="analytics" id="analytics" aria-labelledby="analytics-title">
  <div class="section-head">
    <p data-reveal>AI BUSINESS INSIGHTS</p>
    <h2 id="analytics-title" data-reveal>Simple answers for daily decisions.</h2>
    <span data-reveal>SmartKhata explains what matters in plain language, without complicated business screens.</span>
  </div>

  <div class="analytics-grid">
    @for (insight of insights; track insight.title) {
      <article class="insight-card" data-reveal>
        <p>AI INSIGHT</p>
        <h3>{{ insight.title }}</h3>
        <span>{{ insight.text }}</span>
      </article>
    }
  </div>
</section>
