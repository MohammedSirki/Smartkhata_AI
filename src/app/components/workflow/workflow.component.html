<section #workflowSection class="workflow" id="workflow" aria-labelledby="workflow-title">
  <div class="workflow__header">
    <p class="workflow__label" data-workflow-reveal>HOW IT WORKS</p>
    <h2 id="workflow-title" data-workflow-reveal>
      What SmartKhata can do.
    </h2>
    <p class="workflow__description" data-workflow-reveal>
      SmartKhata keeps daily business work simple, so shop owners can focus on selling.
    </p>
  </div>

  <div class="workflow__actions" aria-label="What SmartKhata can do">
    @for (action of actions; track action) {
      <article class="workflow-card" data-action-card>
        <span class="workflow-card__check">✓</span>
        <h3>{{ action }}</h3>
      </article>
    }
  </div>
</section>
