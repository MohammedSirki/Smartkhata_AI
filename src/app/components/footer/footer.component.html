<footer class="footer">
  <div class="footer-grid">
    <section>
      <img src="assets/logo/logo.png" alt="SmartKhata AI" width="44" height="44">
      <h2>SmartKhata AI</h2>
      <p>Built for the backbone of India's economy — small business owners.</p>
    </section>
    @for (column of columns; track column[0]) {
      <nav [attr.aria-label]="column[0]">
        <h3>{{ column[0] }}</h3>
        @for (link of column.slice(1); track link) { <a href="#">{{ link }}</a> }
      </nav>
    }
  </div>
  <div class="footer-bottom">
    <p>© {{ year }} SmartKhata AI</p>
    <span>GST Compliant</span><span>Data Stored in India</span><span>ISO 27001 Ready</span>
  </div>
</footer>
